name: Build & Release Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build macOS DMG
        run: npm run dist:mac

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-installers
          path: dist/*.dmg

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Windows EXE
        run: npm run dist:win

      - name: Upload EXE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  release:
    name: Publish GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'v1.1.0' }}
          name: RobotStreamer ${{ github.ref_name || 'v1.1.0' }}
          body: |
            ## Download RobotStreamer

            | Platform | Download |
            |----------|----------|
            | 🍎 **macOS** (Apple Silicon M1/M2/M3) | Download `RobotStreamer-*-arm64.dmg` below |
            | 🍎 **macOS** (Intel) | Download `RobotStreamer-*.dmg` below |
            | 🪟 **Windows** | Download `RobotStreamer-Setup-*.exe` below |

            ### How to install
            - **macOS**: Open the `.dmg` → drag RobotStreamer to Applications → open it
            - **Windows**: Double-click the `.exe` → it installs automatically

            ---
            You'll need your **Camera ID** and **Stream Key** from [robotstreamer.com](https://robotstreamer.com) to start streaming.
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
          draft: false
          prerelease: false
